version: '3.8'

services:
  # ==========================================
  # 1. BASE DE DATOS (PostgreSQL)
  # ==========================================
  db:
    image: postgres:14-alpine
    restart: always
    environment:
      POSTGRES_DB: EstacDuoc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Heavensdoa1502!
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ==========================================
  # 2. CEREBRO (Tu Proyecto Django - Raíz)
  # ==========================================
  backend:
    build: . 
    command: sh -c "python manage.py wait_for_db && python manage.py runserver 0.0.0.0:8000"
    # VAMOS A CAMBIAR EL COMANDO EN EL PASO 3
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db  # Solo un depends_on normal
    env_file:
      - .env

  # ==========================================
  # 3. INTERFAZ (Tu Panel de React)
  # ==========================================
  frontend:
    build: ./frontend  # Entra a la carpeta frontend y usa su Dockerfile
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

  # ==========================================
  # 4. EL BUZÓN DE MENSAJES (Redis)
  # ==========================================
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  # ==========================================
  # 5. EL COCINERO (Celery Worker - Ejecutor)
  # ==========================================
  celery_worker:
    build: .  # Usa el mismo código base que el backend
    command: celery -A Estacionamiento worker -l info
    restart: always
    depends_on:
      - db
      - redis
    env_file:
      - .env  # Necesita las mismas credenciales de BD que el backend

  # ==========================================
  # 6. EL GERENTE (Celery Beat - Reloj)
  # ==========================================
  celery_beat:
    build: .  # Usa el mismo código base que el backend
    command: celery -A Estacionamiento beat -l info
    restart: always
    depends_on:
      - db
      - redis
    env_file:
      - .env  # Necesita las mismas credenciales de BD que el backend

volumes:
  postgres_data: